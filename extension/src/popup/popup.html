<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexvia Novia</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="header-left">
          <div class="brand">NOVIA</div>
          <div class="title" id="rootTitle">Settings</div>
        </div>
      </div>
      <div class="tabbar" role="tablist" aria-label="Nexvia Novia">
        <button id="tabTools" class="tab is-active" type="button" role="tab" aria-selected="true">Tools</button>
        <button id="tabCleaners" class="tab" type="button" role="tab" aria-selected="false">Cleaners</button>
      </div>
      <div class="body">
        <div id="panelTools" class="tabpanel" role="tabpanel">
          <div id="tools" class="tools"></div>
        </div>
        <div id="panelCleaners" class="tabpanel" role="tabpanel" hidden>
          <div id="cleaners" class="tools"></div>
        </div>
        <div class="footer">
          <button id="enableAll" class="btn btn-ghost" type="button">Enable all</button>
          <button id="disableAll" class="btn btn-ghost" type="button">Disable all</button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
