<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexvia Novia</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="header-left">
          <div class="brand">NOVIA</div>
          <div class="header-titles">
            <div class="title" id="rootTitle">Assist</div>
            <div class="subtitle" id="rootSubtitle">Active workflows and actions</div>
          </div>
        </div>
      </div>
      <div class="tabbar" role="tablist" aria-label="Nexvia Novia">
        <button id="tabAssist" class="tab is-active" type="button" role="tab" aria-selected="true">Assist</button>
        <button id="tabEnhancements" class="tab" type="button" role="tab" aria-selected="false">Enhancements</button>
      </div>
      <div class="body">
        <div id="panelAssist" class="tabpanel" role="tabpanel">
          <div id="tools" class="tools"></div>
        </div>
        <div id="panelEnhancements" class="tabpanel" role="tabpanel" hidden>
          <div id="cleaners" class="tools"></div>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
